name: Chart Release

on:
  push:
    tags:
      - "chart/v*"

env:
  REGISTRY: ghcr.io
  CHART_PATH: kubernetes/chart

jobs:
  publish:
    name: Package and Push Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#chart/v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid tag format: $GITHUB_REF_NAME (expected chart/vX.Y.Z)" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

          # Extract appVersion from Chart.yaml for reference
          APP_VERSION=$(grep '^appVersion:' ${{ env.CHART_PATH }}/Chart.yaml | awk '{print $2}' | tr -d '"')
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.20.2

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Package chart
        run: |
          helm package ${{ env.CHART_PATH }} \
            --version ${{ steps.version.outputs.value }} \
            --app-version ${{ steps.version.outputs.app_version }} \
            --destination .

      - name: Push chart to GHCR
        run: |
          helm push hmac-manager-${{ steps.version.outputs.value }}.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

  pages:
    name: Publish HTTP repo (GitHub Pages)
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.20.2

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#chart/v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid tag format: $GITHUB_REF_NAME (expected chart/vX.Y.Z)" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          APP_VERSION=$(grep '^appVersion:' ${{ env.CHART_PATH }}/Chart.yaml | awk '{print $2}' | tr -d '"')
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package ${{ env.CHART_PATH }} \
            --version ${{ steps.version.outputs.value }} \
            --app-version ${{ steps.version.outputs.app_version }} \
            --destination .cr-release-packages

      # Publish the package straight to the gh-pages branch rather than as a
      # GitHub Release asset: this repo has immutable releases enabled, which
      # rejects attaching assets to a release (chart-releaser fails on that).
      - name: Publish chart and index to gh-pages
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          git fetch origin gh-pages
          git worktree add gh-pages origin/gh-pages
          cp .cr-release-packages/*.tgz gh-pages/
          cp artifacthub-repo.yml gh-pages/artifacthub-repo.yml
          cp pages/index.html gh-pages/index.html
          cd gh-pages
          if [ -f index.yaml ]; then
            helm repo index . --url "$PAGES_URL" --merge index.yaml
          else
            helm repo index . --url "$PAGES_URL"
          fi
          git add -A
          git commit -m "Publish chart ${{ steps.version.outputs.value }} to HTTP repo"
          git push origin HEAD:gh-pages
