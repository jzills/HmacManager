name: Chart Release

on:
  push:
    tags:
      - "chart/v*"

env:
  REGISTRY: ghcr.io
  CHART_PATH: kubernetes/chart

jobs:
  publish:
    name: Package and Push Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#chart/v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid tag format: $GITHUB_REF_NAME (expected chart/vX.Y.Z)" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

          # Extract appVersion from Chart.yaml for reference
          APP_VERSION=$(grep '^appVersion:' ${{ env.CHART_PATH }}/Chart.yaml | awk '{print $2}' | tr -d '"')
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.20.2

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Package chart
        run: |
          helm package ${{ env.CHART_PATH }} \
            --version ${{ steps.version.outputs.value }} \
            --app-version ${{ steps.version.outputs.app_version }} \
            --destination .

      - name: Push chart to GHCR
        run: |
          helm push hmac-manager-${{ steps.version.outputs.value }}.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
