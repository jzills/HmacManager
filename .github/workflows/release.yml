name: Release

on:
  push:
    branches:
      - 'release/**'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Redis
        uses: supercharge/redis-github-action@1.8.1
        with:
          redis-version: 7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Run unit tests
        working-directory: ./test/Unit
        run: dotnet test --verbosity normal

      - name: Run integration tests
        working-directory: ./test/Integration
        run: dotnet test --verbosity normal

  publish:
    name: Pack and Publish
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from branch name
        id: version
        run: |
          VERSION=$(bash .github/scripts/extract-version.sh "${GITHUB_REF#refs/heads/}")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Pack
        working-directory: ./src
        run: >
          dotnet pack
          --configuration Release
          -p:Version=${{ steps.version.outputs.value }}
          --output ./nupkg

      - name: Push to NuGet
        working-directory: ./src
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  merge:
    name: Open PR to Main
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      pull-requests: write
    steps:
      - name: Create PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Release v${{ needs.publish.outputs.version }}" \
            --body "Automated release PR for v${{ needs.publish.outputs.version }}. Package published to NuGet successfully." \
            --base main \
            --head "${{ github.ref_name }}")
          gh pr merge "$PR_URL" --merge --auto
