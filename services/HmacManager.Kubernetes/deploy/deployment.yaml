apiVersion: apps/v1
kind: Deployment
metadata:
  name: hmac-manager
  namespace: hmac-system
  labels:
    app: hmac-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hmac-manager
  template:
    metadata:
      labels:
        app: hmac-manager
    spec:
      containers:
        - name: hmac-manager
          image: hmac-manager:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
          envFrom:
            - configMapRef:
                name: hmac-manager-config
            - secretRef:
                name: hmac-manager-secrets
