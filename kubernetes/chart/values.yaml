nameOverride: ""
fullnameOverride: ""

image:
  repository: zills/hmac-manager
  tag: 0.0.1
  pullPolicy: IfNotPresent

replicaCount: 1
namespace: hmac-system

# ASP.NET Core environment. Controls which appsettings.{Environment}.json is loaded
# and whether the dev-only signing endpoint is active.
# Allowed values: Production, Staging, Development
environment: Production

service:
  port: 8080

# HMAC authentication policies. At least one policy is required.
#
# Each policy needs a name, a public key (UUID), and a reference to a Kubernetes
# Secret that holds the private key (use External Secrets or a similar operator —
# never commit secret values to git).
#
# All other fields have defaults and can be omitted:
#   algorithms.contentHash  — SHA1 | SHA256 | SHA512       (default: SHA256)
#   algorithms.signingHash  — HMACSHA1 | HMACSHA256 | HMACSHA512 (default: HMACSHA256)
#   nonce.maxAgeInSeconds   — integer >= 1                  (default: 60)
#   schemes                 — list of named header sets     (default: none)
#
# Example:
# policies:
#   - name: MyPolicy
#     publicKey: "00000000-0000-0000-0000-000000000001"
#     privateKeySecret:
#       name: my-hmac-secrets
#       key: myPolicy-privateKey
#     algorithms:
#       contentHash: SHA256
#       signingHash: HMACSHA256
#     nonce:
#       maxAgeInSeconds: 60
#     schemes:
#       - name: UserScheme
#         headers:
#           - name: X-UserId
#             claimType: userId
policies: []

# Distributed nonce cache (Redis).
#
# When enabled, a Redis instance is deployed alongside the app as part of this
# release. All policies automatically use the distributed cache so replay
# protection works correctly across multiple replicas.
#
# When disabled, each pod uses an in-process nonce cache. Replay protection
# still works for a single replica, but NOT across multiple pods. The chart
# refuses replicaCount > 1 when redis is disabled.
redis:
  enabled: true

istio:
  # Master switch — set to false to skip all Istio resources and suppress NOTES output.
  enabled: true

  # Values used to generate the kubectl patch command printed in NOTES after install.
  meshConfig:
    namespace: istio-system
    configMapName: istio
    maxRequestBytes: 8192
    allowPartialMessage: false

  # Ingress gateway enforcement — protects external traffic entering the cluster.
  # Enabled by default. Requires an existing Gateway API Gateway resource.
  ingressGateway:
    enabled: true
    # Name of the Gateway resource to target. Required when enabled.
    name: ""
    # Namespace the Gateway resource lives in. Required when enabled.
    namespace: ""
    authorizationPolicy:
      enabled: true

  # Waypoint enforcement — protects east-west (service-to-service) traffic inside the mesh.
  # Disabled by default. Only useful when Istio ambient mode is active.
  waypoint:
    enabled: false
    # Name of the waypoint Gateway resource. Required when enabled.
    name: ""
    # Namespace the waypoint lives in. Required when enabled.
    namespace: ""
    authorizationPolicy:
      enabled: false
