# Minimal values for `helm lint` in CI.
#
# `policies` has minItems: 1 in values.schema.json — at least one policy is
# always required at install time — so the empty default in values.yaml does not
# satisfy the schema on its own. This file supplies a single sample policy so the
# linter validates a realistic, schema-valid configuration.
policies:
  - name: LintPolicy
    publicKey: "00000000-0000-0000-0000-000000000001"
    privateKeySecret:
      name: lint-secret
      key: private-key
