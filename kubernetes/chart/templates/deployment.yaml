{{- if and (gt (int .Values.replicaCount) 1) (not .Values.redis.enabled) }}
{{- fail "replicaCount > 1 requires redis.enabled=true: the in-process nonce cache is not shared across pods, so replay protection would be bypassed. Set replicaCount to 1 for a single-replica deployment, or enable Redis (redis.enabled=true) to scale safely." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hmac-manager.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hmac-manager.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hmac-manager.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "hmac-manager.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      volumes:
        - name: config
          configMap:
            name: {{ include "hmac-manager.fullname" . }}-config
        {{- if .Values.policies }}
        - name: secret-keys
          projected:
            sources:
              {{- range $i, $policy := .Values.policies }}
              - secret:
                  name: {{ $policy.privateKeySecret.name }}
                  items:
                    - key: {{ $policy.privateKeySecret.key }}
                      path: {{ printf "HmacManager__%d__Keys__PrivateKey" $i }}
              {{- end }}
        {{- end }}
      containers:
        - name: {{ include "hmac-manager.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/hmac-manager
              readOnly: true
            {{- if .Values.policies }}
            - name: secret-keys
              mountPath: /etc/hmac-manager/secrets
              readOnly: true
            {{- end }}
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:{{ .Values.service.port }}"
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.environment | quote }}
            {{- if .Values.redis.enabled }}
            - name: ConnectionStrings__Redis
              value: {{ include "hmac-manager.redisAddress" . | quote }}
            {{- end }}
