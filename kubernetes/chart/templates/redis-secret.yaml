{{- if and .Values.redis.enabled (not .Values.redis.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hmac-manager.fullname" . }}-redis
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hmac-manager.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.redis.existingSecretKey }}: {{ required "redis.connectionString is required when redis.enabled=true and redis.existingSecret is empty" .Values.redis.connectionString | b64enc | quote }}
{{- end }}
