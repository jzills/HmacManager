suite: redis-secret
release:
  name: hmac-manager
templates:
  - redis-secret.yaml

tests:
  - it: renders no secret when redis is disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the connection string secret when redis is enabled
    set:
      redis.enabled: true
      redis.connectionString: redis-master:6379
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: hmac-manager-redis
      - isNotEmpty:
          path: data["ConnectionStrings__Redis"]

  - it: fails when redis is enabled but no connection string is provided
    set:
      redis.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "redis.connectionString is required when redis.enabled=true and redis.existingSecret is empty"

  - it: renders no secret when an existing secret is referenced
    set:
      redis.enabled: true
      redis.existingSecret: my-redis-secret
    asserts:
      - hasDocuments:
          count: 0
