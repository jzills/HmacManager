suite: redis-secret
release:
  name: hmac-manager
templates:
  - redis-secret.yaml

tests:
  - it: renders no secret when redis is disabled
    set:
      redis.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no secret when bundled redis is enabled (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the connection string secret when BYO redis is enabled
    set:
      redis.bundled: false
      redis.connectionString: redis-master:6379
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: hmac-manager-redis
      - isNotEmpty:
          path: data["ConnectionStrings__Redis"]

  - it: fails when BYO redis has no connection string or existing secret
    set:
      redis.bundled: false
    asserts:
      - failedTemplate:
          errorMessage: "redis.connectionString is required when redis.enabled=true and redis.existingSecret is empty"

  - it: renders no secret when an existing secret is referenced
    set:
      redis.bundled: false
      redis.existingSecret: my-redis-secret
    asserts:
      - hasDocuments:
          count: 0
