suite: notes
release:
  name: hmac-manager
values:
  - values/base.yaml
templates:
  - NOTES.txt

tests:
  - it: warns that nothing is enforcing when no enforcement point is enabled
    asserts:
      - matchRegexRaw:
          pattern: "No enforcement configured"

  - it: does not warn when the ingress gateway is enabled
    set:
      istio.ingressGateway.enabled: true
      istio.ingressGateway.name: my-gateway
      istio.ingressGateway.namespace: default
    asserts:
      - notMatchRegexRaw:
          pattern: "No enforcement configured"
