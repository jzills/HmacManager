suite: redis-service
release:
  name: hmac-manager
templates:
  - redis-service.yaml

tests:
  - it: renders the bundled Redis Service by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: hmac-manager-redis
      - equal:
          path: spec.ports[0].port
          value: 6379

  - it: renders no Service when redis is disabled
    set:
      redis.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no Service when BYO redis is used
    set:
      redis.bundled: false
      redis.connectionString: redis-master:6379
    asserts:
      - hasDocuments:
          count: 0
