suite: service
release:
  name: hmac-manager
values:
  - values/base.yaml
templates:
  - service.yaml

tests:
  - it: selects the app component so it never routes to bundled Redis pods
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: hmac-manager
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: server
