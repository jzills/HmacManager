suite: secret
release:
  name: hmac-manager
templates:
  - secret.yaml

tests:
  - it: renders the secret when existingSecret is not set
    set:
      secretData:
        HmacManager__0__Keys__PrivateKey: my-private-key
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: hmac-manager-secrets
      - isNotEmpty:
          path: data["HmacManager__0__Keys__PrivateKey"]

  - it: renders no secret when existingSecret is set
    set:
      existingSecret: my-vault-secret
    asserts:
      - hasDocuments:
          count: 0
