suite: configmap
release:
  name: hmac-manager
templates:
  - configmap.yaml

tests:
  - it: renders a ConfigMap
    set:
      policies:
        - name: MyPolicy
          publicKey: "00000000-0000-0000-0000-000000000001"
          privateKeySecret:
            name: my-secret
            key: private-key
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: hmac-manager-config

  - it: includes policy name and public key in config.json
    set:
      policies:
        - name: MyPolicy
          publicKey: "00000000-0000-0000-0000-000000000001"
          privateKeySecret:
            name: my-secret
            key: private-key
    asserts:
      - matchRegex:
          path: data["config.json"]
          pattern: '"Name":"MyPolicy"'
      - matchRegex:
          path: data["config.json"]
          pattern: '"PublicKey":"00000000-0000-0000-0000-000000000001"'

  - it: sets CacheType to Distributed when redis is enabled
    set:
      policies:
        - name: MyPolicy
          publicKey: "00000000-0000-0000-0000-000000000001"
          privateKeySecret:
            name: my-secret
            key: private-key
    asserts:
      - matchRegex:
          path: data["config.json"]
          pattern: '"CacheType":"Distributed"'

  - it: sets CacheType to Memory when redis is disabled
    set:
      redis.enabled: false
      policies:
        - name: MyPolicy
          publicKey: "00000000-0000-0000-0000-000000000001"
          privateKeySecret:
            name: my-secret
            key: private-key
    asserts:
      - matchRegex:
          path: data["config.json"]
          pattern: '"CacheType":"Memory"'

  - it: uses default algorithms when not specified
    set:
      policies:
        - name: MyPolicy
          publicKey: "00000000-0000-0000-0000-000000000001"
          privateKeySecret:
            name: my-secret
            key: private-key
    asserts:
      - matchRegex:
          path: data["config.json"]
          pattern: '"ContentHashAlgorithm":"SHA256"'
      - matchRegex:
          path: data["config.json"]
          pattern: '"SigningHashAlgorithm":"HMACSHA256"'

  - it: respects custom algorithms
    set:
      policies:
        - name: MyPolicy
          publicKey: "00000000-0000-0000-0000-000000000001"
          privateKeySecret:
            name: my-secret
            key: private-key
          algorithms:
            contentHash: SHA512
            signingHash: HMACSHA512
    asserts:
      - matchRegex:
          path: data["config.json"]
          pattern: '"ContentHashAlgorithm":"SHA512"'
      - matchRegex:
          path: data["config.json"]
          pattern: '"SigningHashAlgorithm":"HMACSHA512"'

  - it: uses default nonce maxAgeInSeconds when not specified
    set:
      policies:
        - name: MyPolicy
          publicKey: "00000000-0000-0000-0000-000000000001"
          privateKeySecret:
            name: my-secret
            key: private-key
    asserts:
      - matchRegex:
          path: data["config.json"]
          pattern: '"MaxAgeInSeconds":60'

  - it: respects custom nonce maxAgeInSeconds
    set:
      policies:
        - name: MyPolicy
          publicKey: "00000000-0000-0000-0000-000000000001"
          privateKeySecret:
            name: my-secret
            key: private-key
          nonce:
            maxAgeInSeconds: 120
    asserts:
      - matchRegex:
          path: data["config.json"]
          pattern: '"MaxAgeInSeconds":120'

  - it: includes schemes and headers when specified
    set:
      policies:
        - name: MyPolicy
          publicKey: "00000000-0000-0000-0000-000000000001"
          privateKeySecret:
            name: my-secret
            key: private-key
          schemes:
            - name: UserScheme
              headers:
                - name: X-UserId
                  claimType: userId
    asserts:
      - matchRegex:
          path: data["config.json"]
          pattern: '"Name":"UserScheme"'
      - matchRegex:
          path: data["config.json"]
          pattern: '"Name":"X-UserId"'

  - it: does not include private keys in config.json
    set:
      policies:
        - name: MyPolicy
          publicKey: "00000000-0000-0000-0000-000000000001"
          privateKeySecret:
            name: my-secret
            key: private-key
    asserts:
      - notMatchRegex:
          path: data["config.json"]
          pattern: PrivateKey
