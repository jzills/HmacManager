# Patch the Istio MeshConfig to register the HmacManager service as an
# ext-authz extension provider. Apply with:
#   kubectl patch configmap istio -n istio-system --patch "$(cat mesh-config-patch.yaml)"
#
# withRequestBody is required because HMAC signatures cover the request body hash.
# Tune maxRequestBytes to match the largest expected payload in your workloads.
apiVersion: v1
kind: ConfigMap
metadata:
  name: istio
  namespace: istio-system
data:
  mesh: |
    extensionProviders:
    - name: hmac-manager
      envoyExtAuthzHttp:
        service: hmac-manager.hmac-system.svc.cluster.local
        port: 8080
        withRequestBody:
          maxRequestBytes: 8192
          allowPartialMessage: false
