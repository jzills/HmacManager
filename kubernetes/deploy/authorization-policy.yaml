# Instructs the Istio waypoint proxy to verify HMAC auth on all inbound requests
# via the hmac-manager ext-authz provider.
#
# In ambient mode, AuthorizationPolicy targets the waypoint Gateway resource rather
# than individual pods. Replace `waypoint` with the name of your namespace waypoint.
#
# The hmac-manager service itself should run in a separate namespace (hmac-system)
# that is NOT enrolled in this waypoint to avoid a circular ext-authz dependency.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: hmac-auth
  namespace: default
spec:
  targetRefs:
    - kind: Gateway
      group: gateway.networking.k8s.io
      name: waypoint
  action: CUSTOM
  provider:
    name: hmac-manager
  rules:
    - {}
